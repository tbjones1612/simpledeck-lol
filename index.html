<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>simpledeck.lol</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app">
    <section class="left-column">
      <div class="preview-header">
        <h1>simpledeck.lol</h1>
        <button type="button" id="resetBtn" class="reset-text">RESET</button>
      </div>

      <div class="controls" aria-label="Decklist controls" autocomplete="off">
        <fieldset>
          <legend>Info Box</legend>

          <label data-field-control="deckTitle">Title
            <input id="deckTitle" maxlength="60" placeholder="Title your deck!">
          </label>

          <label data-field-control="playerName">Player Name
            <input id="playerName" maxlength="60" placeholder="What is your name?" />
          </label>

          <label data-field-control="playerId">Player ID
            <input id="playerId" maxlength="20" placeholder="Pokemon Play ID" />
          </label>

          <label data-field-control="eventName">Event
            <input id="eventName" maxlength="60" placeholder="Where are you competing?" />
          </label>

          <div class="row date-row" id="dateRow">
            <label data-field-control="date">List Date
              <input id="date" maxlength="20"  placeholder="List date" />
            </label>

            <label data-field-control="competitionDate">Event Date
              <input id="competitionDate" maxlength="20" placeholder="Event date" />
            </label>
          </div>

          <label data-field-control="country">Country
            <input id="country" value="USA" placeholder="Where are you from?" />
          </label>

          <label data-field-control="deckArchetype">Deck Archetype
            <input id="deckArchetype" maxlength="60" placeholder="Archetype / Variant" />
          </label>

          <div class="checks" aria-label="Visible info fields">
            <label><input type="checkbox" class="field-toggle" data-field="deckTitle" checked />
              Title</label>
            <label><input type="checkbox" class="field-toggle" data-field="playerName" checked />
              Player</label>
            <label><input type="checkbox" class="field-toggle" data-field="playerId" checked />
              Player ID</label>
            <label><input type="checkbox" class="field-toggle" data-field="eventName" checked />
              Event</label>
            <label><input type="checkbox" class="field-toggle" data-field="date" />List Date</label>
            <label><input type="checkbox" class="field-toggle" data-field="competitionDate" /> Event
              Date</label>
            <label><input type="checkbox" class="field-toggle" data-field="country" />
              Country</label>
            <label><input type="checkbox" class="field-toggle" data-field="deckArchetype" />
              Archetype</label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Decklist</legend>

          <label>Paste card list
            <textarea id="deckInput" autocomplete="off" placeholder="Paste in your decklist using PTCGL formatting.">
            </textarea>
          </label>

          <div class="row">
            <label>Border
              <input id="borderChar" value="#" maxlength="1" autocomplete="off" />
            </label>

            <label>Paper Width
              <select id="paperWidth" autocomplete="off">
                <option value="86" selected>86 characters</option>
                <option value="92">92 characters</option>
                <option value="100">100 characters</option>
              </select>
            </label>

            <label>Columns
              <select id="columns" autocomplete="off">
                <option value="1" selected>1</option>
                <option value="2">2</option>
              </select>
            </label>
          </div>
        </fieldset>

        <div class="buttons">
          <button id="printBtn">Print to PDF</button>
          <button id="saveBtn" class="secondary">Save Image</button>
        </div>

        <div class="color-row" aria-label="Preview background color">
          <button type="button" class="color-swatch active" data-color="#0b0b0b" style="--swatch-color:#0b0b0b"
            title="Default"></button>
          <button type="button" class="color-swatch" data-color="#00451b" style="--swatch-color:#00451b"
            title="Grass"></button>
          <button type="button" class="color-swatch" data-color="#5a0c06" style="--swatch-color:#5a0c06"
            title="Fire"></button>
          <button type="button" class="color-swatch" data-color="#00275f" style="--swatch-color:#00275f"
            title="Water"></button>
          <button type="button" class="color-swatch" data-color="#5a4500" style="--swatch-color:#5a4500"
            title="Electric"></button>
          <button type="button" class="color-swatch" data-color="#3f0960" style="--swatch-color:#3f0960"
            title="Psychic"></button>
          <button type="button" class="color-swatch" data-color="#4a2608" style="--swatch-color:#4a2608"
            title="Fighting"></button>
          <button type="button" class="color-swatch" data-color="#080F1F" style="--swatch-color:#080F1F"
            title="Dark"></button>
          <button type="button" class="color-swatch" data-color="#454850" style="--swatch-color:#454850"
            title="Steel"></button>
          <button type="button" class="color-swatch" data-color="#403713" style="--swatch-color:#403713"
            title="Dragon"></button>
          <button type="button" class="color-swatch" data-color="#ffffff" style="--swatch-color:#ffffff"
            title="White"></button>
          <button type="button" class="color-swatch" data-bg="rainbow"
            style="--swatch-color:linear-gradient(135deg,rgba(255,0,0,0.24),rgba(255,255,0,0.24),rgba(0,255,0,0.24),rgba(0,255,255,0.24),rgba(0,0,255,0.24),rgba(255,0,255,0.24))"
            title="Rainbow"></button>
        </div>

        <div class="number-row" aria-label="Background style">
          <button type="button" class="number-box active" data-style="default">Default</button>
          <button type="button" class="number-box" data-style="lines">Lines</button>
          <button type="button" class="number-box" data-style="gradient">Gradient</button>
          <button type="button" class="number-box" data-style="ball">Ball</button>
        </div>

        <div id="warning" class="warning" aria-live="polite"></div>
      </div>
    </section>

    <section class="preview-wrap" aria-label="Live preview">
      <div class="preview-header">
        <h2>Live Preview</h2>
        <div id="total" class="total"></div>
      </div>

      <div class="page-shell">
        <div id="printPage">
          <pre id="asciiPreview"></pre>
        </div>
      </div>
    </section>
  </main>

  <div id="resetDialog" class="reset-confirm-overlay" hidden>
    <div class="reset-confirm" role="dialog" aria-modal="true" aria-labelledby="resetDialogTitle">
      <h2 id="resetDialogTitle">Are you sure you're sure?</h2>
      <p>CLEAR all Deck Info and Decklist?</p>
      <div class="reset-confirm-actions">
        <button type="button" id="cancelResetBtn" class="secondary">Cancel</button>
        <button type="button" id="confirmResetBtn" class="danger">Confirm</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
